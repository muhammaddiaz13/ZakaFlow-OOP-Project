spring.application.name=zakaflow

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Proxy/Railway: agar redirect_uri memakai https + domain publik
server.forward-headers-strategy=framework

# Google OAuth2 — Client ID dari Google Cloud Console (ZakaFlow Web Client)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:293117929342-i7tlb86c3kaj02534sf82peo3mdtk6qc.apps.googleusercontent.com}
# Wajib: salin Client Secret dari Google Console → ganti nilai di bawah atau set env GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

zakaflow.upload.dir=uploads