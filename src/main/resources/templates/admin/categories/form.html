<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/admin :: head(${isEdit} ? 'Edit Kategori' : 'Tambah Kategori')}"></head>
<body class="bg-stone-100 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/admin :: navbar}" th:with="activePage='categories'"></nav>

<main class="flex-1 max-w-xl mx-auto w-full px-4 py-8">
    <a th:href="@{/admin/categories}" class="text-sm text-primary-700 hover:text-primary-900 font-medium mb-6 inline-block">&larr; Kembali</a>

    <h1 class="text-2xl font-bold text-stone-900 mb-6" th:text="${isEdit} ? 'Edit Kategori' : 'Tambah Kategori'">Form</h1>

    <div th:replace="~{layout/admin :: alerts}"></div>

    <form th:action="@{/admin/categories/save}" method="post"
          class="bg-white rounded-2xl shadow-sm border border-stone-200 p-8 space-y-5">
        <input type="hidden" name="id" th:if="${isEdit}" th:value="${category.id}"/>

        <div>
            <label for="name" class="block text-sm font-medium text-stone-700 mb-1">Nama Kategori</label>
            <input type="text" id="name" name="name" required th:value="${category.name}"
                   class="w-full px-4 py-2.5 border border-stone-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"
                   placeholder="Contoh: Zakat"/>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-stone-700 mb-1">Deskripsi</label>
            <textarea id="description" name="description" rows="3"
                      class="w-full px-4 py-2.5 border border-stone-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"
                      th:text="${category.description}"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-3 rounded-lg transition">
            Simpan Kategori
        </button>
    </form>
</main>

<footer th:replace="~{layout/admin :: footer}"></footer>
</body>
</html>
