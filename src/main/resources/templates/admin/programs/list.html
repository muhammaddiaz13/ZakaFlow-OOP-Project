<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/admin :: head('Kelola Program')}"></head>
<body class="bg-stone-100 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/admin :: navbar}" th:with="activePage='programs'"></nav>

<main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
    <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-stone-900">Kelola Program</h1>
            <p class="text-stone-600 mt-1">Daftar semua program donasi.</p>
        </div>
        <a th:href="@{/admin/programs/new}"
           class="bg-primary-700 hover:bg-primary-800 text-white font-semibold px-5 py-2.5 rounded-lg transition">
            + Tambah Program
        </a>
    </div>

    <div th:replace="~{layout/admin :: alerts}"></div>

    <div th:if="${#lists.isEmpty(programs)}" class="text-center py-16 bg-white rounded-xl border text-stone-500">
        Belum ada program. <a th:href="@{/admin/programs/new}" class="text-primary-700 font-medium">Tambah sekarang</a>
    </div>

    <div th:unless="${#lists.isEmpty(programs)}" class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-x-auto">
        <table class="w-full text-sm min-w-[800px]">
            <thead class="bg-stone-50 border-b border-stone-200">
            <tr>
                <th class="text-left px-5 py-3 font-semibold">Judul</th>
                <th class="text-left px-5 py-3 font-semibold">Kategori</th>
                <th class="text-right px-5 py-3 font-semibold">Terkumpul / Target</th>
                <th class="text-center px-5 py-3 font-semibold">Status</th>
                <th class="text-center px-5 py-3 font-semibold">Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${programs}" class="border-b border-stone-100 hover:bg-stone-50/50">
                <td class="px-5 py-4">
                    <div class="flex items-center gap-3">
                        <img th:if="${p.imageData != null}" th:src="@{'/programs/image/' + ${p.id}}"
                             alt="" class="w-12 h-12 rounded-lg object-cover border border-stone-200 shrink-0"/>
                        <div th:unless="${p.imageData != null}"
                             class="w-12 h-12 rounded-lg bg-primary-100 text-primary-700 text-xs flex items-center justify-center shrink-0 font-semibold">IMG</div>
                        <div>
                            <p class="font-medium text-stone-900" th:text="${p.title}">Judul</p>
                            <p class="text-xs text-stone-500 line-clamp-1 mt-0.5" th:text="${p.description}">Deskripsi</p>
                        </div>
                    </div>
                </td>
                <td class="px-5 py-4" th:text="${p.category.name}">Kategori</td>
                <td class="px-5 py-4 text-right text-stone-700">
                    <span th:text="${#numbers.formatDecimal(p.currentAmount, 0, 'COMMA', 0, 'POINT')}">0</span>
                    /
                    <span th:text="${#numbers.formatDecimal(p.targetAmount, 0, 'COMMA', 0, 'POINT')}">0</span>
                </td>
                <td class="px-5 py-4 text-center">
                    <span th:if="${p.isCompleted}" class="bg-green-50 text-green-700 px-2 py-1 rounded text-xs font-medium">Selesai</span>
                    <span th:unless="${p.isCompleted}" class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-medium">Aktif</span>
                </td>
                <td class="px-5 py-4 text-center">
                    <a th:href="@{/admin/programs/{id}/edit(id=${p.id})}"
                       class="text-primary-700 hover:text-primary-900 font-medium mr-3">Edit</a>
                    <form th:action="@{/admin/programs/{id}/delete(id=${p.id})}" method="post" class="inline js-confirm-submit"
                          th:attr="data-confirm-title='Hapus Program Donasi?',
                                   data-confirm-text=|Program &quot;${p.title}&quot; akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.|,
                                   data-confirm-button='Ya, Hapus'">
                        <button type="submit" class="text-red-600 hover:text-red-800 font-medium">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{layout/admin :: footer}"></footer>
<div th:replace="~{layout/admin :: confirmScripts}"></div>
</body>
</html>
