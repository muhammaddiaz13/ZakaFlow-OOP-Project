<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/admin :: head(${isEdit} ? 'Edit Program' : 'Tambah Program')}"></head>
<body class="bg-stone-100 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/admin :: navbar}" th:with="activePage='programs'"></nav>

<main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
    <a th:href="@{/admin/programs}" class="text-sm text-primary-700 hover:text-primary-900 font-medium mb-6 inline-block">&larr; Kembali</a>

    <h1 class="text-2xl font-bold text-stone-900 mb-6" th:text="${isEdit} ? 'Edit Program' : 'Tambah Program Baru'">Form</h1>

    <div th:replace="~{layout/admin :: alerts}"></div>

    <form th:action="@{/admin/programs/save}" method="post" enctype="multipart/form-data"
          class="bg-white rounded-2xl shadow-sm border border-stone-200 p-8 space-y-5">
        <input type="hidden" name="id" th:if="${isEdit}" th:value="${program.id}"/>

        <div>
            <label for="title" class="block text-sm font-medium text-stone-700 mb-1">Judul Program</label>
            <input type="text" id="title" name="title" required th:value="${program.title}"
                   class="w-full px-4 py-2.5 border border-stone-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"/>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-stone-700 mb-1">Deskripsi</label>
            <textarea id="description" name="description" rows="4"
                      class="w-full px-4 py-2.5 border border-stone-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"
                      th:text="${program.description}"></textarea>
        </div>

        <div>
            <label for="categoryId" class="block text-sm font-medium text-stone-700 mb-1">Kategori</label>
            <select id="categoryId" name="categoryId" required
                    class="w-full px-4 py-2.5 border border-stone-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none">
                <option value="" disabled th:selected="${program.category == null}">Pilih kategori</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                        th:selected="${program.category != null and program.category.id == c.id}">Kategori</option>
            </select>
        </div>

        <div>
            <label for="image" class="block text-sm font-medium text-stone-700 mb-1">Gambar Program</label>
            <div th:if="${program.imagePath != null}" class="mb-3">
                <img th:src="@{'/uploads/' + ${program.imagePath}}" alt="Gambar program"
                     class="w-full max-h-48 object-cover rounded-lg border border-stone-200"/>
                <label class="mt-2 flex items-center gap-2 text-sm text-stone-600">
                    <input type="checkbox" name="removeImage" value="true" class="rounded border-stone-300"/>
                    Hapus gambar saat ini
                </label>
            </div>
            <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/webp,image/gif"
                   class="w-full text-sm text-stone-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary-50 file:text-primary-800 file:font-medium hover:file:bg-primary-100"/>
            <p class="text-xs text-stone-500 mt-1">Opsional. Maks. 5 MB (JPG, PNG, WEBP, GIF).</p>
        </div>

        <div>
            <label for="targetAmount" class="block text-sm font-medium text-stone-700 mb-1">Target Donasi (Rp)</label>
            <input type="number" id="targetAmount" name="targetAmount" required min="1" step="1000"
                   th:value="${program.targetAmount}"
                   class="w-full px-4 py-2.5 border border-stone-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"/>
        </div>

        <div th:if="${isEdit}" class="p-4 bg-stone-50 rounded-lg text-sm text-stone-600">
            Terkumpul: <strong th:text="${#numbers.formatDecimal(program.currentAmount, 0, 'COMMA', 0, 'POINT')}">0</strong>
            &mdash; Status:
            <strong th:text="${program.isCompleted} ? 'Selesai' : 'Aktif'">Aktif</strong>
        </div>

        <button type="submit"
                class="w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-3 rounded-lg transition">
            Simpan Program
        </button>
    </form>
</main>

<footer th:replace="~{layout/admin :: footer}"></footer>
</body>
</html>
