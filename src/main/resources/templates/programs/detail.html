<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head(${program.title})}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
    <a th:href="@{/programs}" class="text-sm text-primary-700 hover:text-primary-800 font-medium mb-6 inline-block">
        &larr; Kembali ke daftar program
    </a>

    <article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
        <span class="text-xs font-medium text-primary-700 bg-primary-50 px-2 py-1 rounded"
              th:text="${program.category.name}">Kategori</span>

        <h1 class="text-3xl font-bold text-slate-900 mt-4" th:text="${program.title}">Judul Program</h1>
        <p class="text-slate-600 mt-4 leading-relaxed" th:text="${program.description}">Deskripsi program</p>

        <th:block th:with="progress=${program.targetAmount.signum() > 0 ? (program.currentAmount.doubleValue() / program.targetAmount.doubleValue() * 100) : 0}">
            <div class="mt-8 p-5 bg-slate-50 rounded-xl">
                <div class="flex justify-between text-sm font-medium text-slate-700 mb-2">
                    <span>Progress Donasi</span>
                    <span th:text="${#numbers.formatDecimal(progress, 1, 'COMMA', 1, 'POINT')} + '%'">0%</span>
                </div>
                <div class="h-3 bg-slate-200 rounded-full overflow-hidden">
                    <div class="h-full bg-primary-600 rounded-full transition-all"
                         th:style="'width:' + ${progress} + '%'"></div>
                </div>
                <div class="flex justify-between mt-3 text-sm text-slate-600">
                    <span>Terkumpul: <strong th:text="${#numbers.formatDecimal(program.currentAmount, 0, 'COMMA', 0, 'POINT')}">0</strong></span>
                    <span>Target: <strong th:text="${#numbers.formatDecimal(program.targetAmount, 0, 'COMMA', 0, 'POINT')}">0</strong></span>
                </div>
            </div>
        </th:block>

        <div th:if="${program.isCompleted}" class="mt-6 p-4 bg-green-50 text-green-800 rounded-lg text-sm font-medium border border-green-100">
            Program ini telah mencapai target donasi. Terima kasih!
        </div>
        <div th:unless="${program.isCompleted}" class="mt-6">
            <button type="button" disabled
                    class="w-full bg-primary-600 text-white font-semibold py-3 rounded-lg opacity-75 cursor-not-allowed">
                Form Donasi — Segera Hadir
            </button>
        </div>
    </article>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
