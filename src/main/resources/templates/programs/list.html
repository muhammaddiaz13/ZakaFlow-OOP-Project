<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Program Donasi')}"></head>
<body class="bg-surface-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

<nav th:replace="~{layout/main :: navbar}" th:with="activePage='programs'"></nav>

<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Program Donasi</h1>
    <p class="text-gray-500 mb-8">Pilih program yang ingin Anda dukung.</p>

    <div th:if="${#lists.isEmpty(programs)}" class="text-center py-16 bg-white rounded-2xl border border-surface-200 text-gray-500 shadow-card">
        Belum ada program donasi aktif.
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" th:unless="${#lists.isEmpty(programs)}">
        <article th:each="p : ${programs}"
                 class="bg-white rounded-2xl shadow-card border border-surface-100 overflow-hidden hover:shadow-lg transition group">

            <div class="relative h-40 overflow-hidden bg-surface-100">
                <img th:if="${p.imageData != null}" th:src="@{'/programs/image/' + ${p.id}}" th:alt="${p.title}"
                     class="w-full h-full object-cover group-hover:scale-105 transition duration-300"/>
                <div th:unless="${p.imageData != null}" class="h-full bg-gradient-to-br from-primary-100 to-primary-200 flex items-center justify-center text-primary-600 text-sm font-medium">
                    Program Donasi
                </div>
                <span class="absolute top-3 left-3 text-[10px] font-bold uppercase tracking-wider text-primary-700 bg-white/90 backdrop-blur px-2.5 py-1 rounded-lg"
                      th:text="${p.category.name}">Kategori</span>
            </div>

            <div class="p-5">
                <h2 class="text-lg font-semibold text-gray-900" th:text="${p.title}">Judul</h2>
                <p class="text-sm text-gray-500 mt-2 line-clamp-3" th:text="${p.description}">Deskripsi</p>

                <th:block th:with="progress=${p.targetAmount.signum() > 0 ? (p.currentAmount.doubleValue() / p.targetAmount.doubleValue() * 100) : 0}">
                    <div class="mt-4">
                        <div class="flex justify-between text-sm text-gray-500 mb-1.5">
                            <span>Terkumpul</span>
                            <span th:text="${#numbers.formatDecimal(p.currentAmount, 0, 'COMMA', 0, 'POINT')} + ' / ' + ${#numbers.formatDecimal(p.targetAmount, 0, 'COMMA', 0, 'POINT')}">0</span>
                        </div>
                        <div class="h-2 bg-surface-200 rounded-full overflow-hidden">
                            <div class="h-full bg-primary-500 rounded-full transition-all"
                                 th:style="'width:' + ${progress} + '%'"></div>
                        </div>
                    </div>
                </th:block>

                <a th:href="@{/programs/{id}(id=${p.id})}"
                   class="mt-4 block text-center bg-primary-500 hover:bg-primary-600 text-white py-2.5 rounded-xl transition text-sm font-semibold shadow-sm">
                    Donasi Sekarang
                </a>
            </div>
        </article>
    </div>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
