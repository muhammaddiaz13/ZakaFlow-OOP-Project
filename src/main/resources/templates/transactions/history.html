<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Riwayat Transaksi')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Riwayat Transaksi</h1>
    <p class="text-slate-600 mb-8">Daftar donasi yang tercatat di sistem.</p>

    <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-16 bg-white rounded-xl border text-slate-500">
        Belum ada transaksi donasi.
    </div>

    <div th:unless="${#lists.isEmpty(transactions)}" class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-50 border-b border-slate-100">
            <tr>
                <th class="text-left px-6 py-3 font-semibold text-slate-700">Tanggal</th>
                <th class="text-left px-6 py-3 font-semibold text-slate-700">Donatur</th>
                <th class="text-left px-6 py-3 font-semibold text-slate-700">Program</th>
                <th class="text-right px-6 py-3 font-semibold text-slate-700">Jumlah</th>
                <th class="text-center px-6 py-3 font-semibold text-slate-700">Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${transactions}" class="border-b border-slate-50 hover:bg-slate-50/50">
                <td class="px-6 py-4 text-slate-600"
                    th:text="${#temporals.format(t.transactionDate, 'dd MMM yyyy HH:mm')}">Tanggal</td>
                <td class="px-6 py-4 font-medium" th:text="${t.user.username}">User</td>
                <td class="px-6 py-4" th:text="${t.program.title}">Program</td>
                <td class="px-6 py-4 text-right font-medium text-primary-700"
                    th:text="${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')}">0</td>
                <td class="px-6 py-4 text-center">
                    <span th:switch="${t.status.name()}"
                          th:class="${t.status.name() == 'SUCCESS'} ? 'bg-green-50 text-green-700' : (${t.status.name() == 'PENDING'} ? 'bg-amber-50 text-amber-700' : 'bg-red-50 text-red-700')"
                          class="px-2 py-1 rounded text-xs font-medium"
                          th:text="${t.status}">Status</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
