<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Kategori Donasi')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Kategori Donasi</h1>
    <p class="text-slate-600 mb-8">Klasifikasi jenis zakat, infak, dan sedekah.</p>

    <div th:if="${#lists.isEmpty(categories)}" class="text-center py-16 text-slate-500">
        Belum ada kategori.
    </div>

    <div th:unless="${#lists.isEmpty(categories)}" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <article th:each="c : ${categories}"
                 class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 hover:shadow-md transition">
            <div class="w-10 h-10 rounded-lg bg-primary-50 flex items-center justify-center mb-4">
                <span class="text-primary-700 font-bold text-lg" th:text="${#strings.substring(c.name, 0, 1)}">Z</span>
            </div>
            <h2 class="text-xl font-semibold text-slate-900" th:text="${c.name}">Nama</h2>
            <p class="text-sm text-slate-600 mt-2" th:text="${c.description}">Deskripsi kategori</p>
        </article>
    </div>

    <div th:if="${#lists.isEmpty(categories)}" class="text-center py-16 text-slate-500">
        Belum ada kategori.
    </div>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
