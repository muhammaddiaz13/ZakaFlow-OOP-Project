<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Beranda')}"></head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <section class="relative rounded-2xl overflow-hidden shadow-xl mb-10 min-h-[300px] flex items-center">
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
            th:style="|background-image: url('@{/img/bg.jpg}');|"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-primary-950/90 via-primary-900/75 to-primary-800/40"></div>
        <div class="relative z-10 p-10 md:p-12 text-white max-w-2xl">
            <h1 class="text-3xl md:text-4xl font-bold mb-3">Selamat datang di ZakaFlow</h1>
            <p class="text-white/90 text-lg leading-relaxed">
                Kelola zakat, infak, dan sedekah dengan transparan dan terpercaya.
            </p>
            <a th:href="@{/programs}"
                class="inline-block mt-6 bg-accent-500 hover:bg-accent-600 text-white font-semibold px-6 py-3 rounded-lg shadow-lg transition">
                Lihat Program Donasi
            </a>
        </div>
    </section>

    <section>
        <h2 class="text-2xl font-bold text-stone-900 mb-6">Program Aktif</h2>
        <div th:if="${#lists.isEmpty(programs)}" class="text-center py-12 text-stone-500 bg-white rounded-xl border border-surface-200">
            Belum ada program donasi aktif.
        </div>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" th:unless="${#lists.isEmpty(programs)}">
            <article th:each="p : ${programs}"
                    class="bg-white rounded-xl shadow-sm border border-surface-200 overflow-hidden hover:shadow-md transition">
                <div th:if="${p.imagePath != null}" class="h-36 overflow-hidden bg-surface-100">
                    <img th:src="@{'/uploads/' + ${p.imagePath}}" th:alt="${p.title}" class="w-full h-full object-cover"/>
                </div>
                <div class="p-5">
                    <span class="text-xs font-medium text-primary-800 bg-primary-100 px-2 py-1 rounded" th:text="${p.category.name}">
                        Kategori
                    </span>
                    <h3 class="mt-2 text-lg font-semibold text-stone-900" th:text="${p.title}">Judul Program</h3>
                    <p class="text-sm text-stone-600 mt-2 line-clamp-2" th:text="${p.description}">Deskripsi</p>
                    <a th:href="@{/programs/{id}(id=${p.id})}"
                    class="mt-4 block text-center bg-primary-600 text-white py-2 rounded-lg hover:bg-primary-700 transition text-sm font-medium">
                        Lihat Detail
                    </a>
                </div>
            </article>
        </div>
    </section>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
