<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="id">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | ZakaFlow'">ZakaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* Sage & forest — hijab & spanduk di bg.jpg */
                        primary: {
                            50:  '#f4f7f2',
                            100: '#e3ebe0',
                            200: '#c9d8c4',
                            300: '#a3b89c',
                            400: '#7d9a75',
                            500: '#5f8260',
                            600: '#4d6b4e',
                            700: '#3f5840',
                            800: '#334833',
                            900: '#2a3b29',
                            950: '#1a2619',
                        },
                        /* Terracotta & golden hour — atap, batik, cahaya matahari */
                        accent: {
                            50:  '#fdf8f3',
                            100: '#faeee3',
                            200: '#f4d9c4',
                            300: '#e8bc94',
                            400: '#d9966a',
                            500: '#c97d4f',
                            600: '#a8643d',
                            700: '#8a5032',
                            800: '#6f4129',
                            900: '#5a3522',
                        },
                        /* Krem hangat — kardus & langit senja */
                        surface: {
                            50:  '#faf7f2',
                            100: '#f0ebe3',
                            200: '#e2d9cc',
                        },
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:fragment="navbar" class="bg-primary-900 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a th:href="@{/}" class="text-xl font-bold tracking-tight hover:text-accent-200 transition">ZakaFlow</a>
        <div class="flex flex-wrap gap-1 text-sm font-medium items-center">
            <a th:href="@{/programs}" class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition">Program</a>
            <a th:href="@{/categories}" class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition">Kategori</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition">Admin</a>
            <a sec:authorize="hasRole('DONATUR')" th:href="@{/user}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition">Dashboard</a>
            <a sec:authorize="hasRole('DONATUR')" th:href="@{/user/profile}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition">Profil</a>

            <span sec:authorize="isAuthenticated()"
                  class="hidden sm:inline-flex items-center px-3 py-2 text-white/90">
                <span class="opacity-80 mr-2">|</span>
                <span sec:authentication="name" class="font-semibold">User</span>
            </span>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}"
               class="hover:text-accent-200 bg-accent-500 hover:bg-accent-600 px-3 py-2 mx-1 rounded-lg transition">Masuk</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}"
               class="hover:text-accent-200 border border-accent-400 px-3 py-2 rounded-lg transition">Daftar</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline ml-1">
                <button type="submit"
                        class="hover:text-accent-200 bg-accent-600 hover:bg-accent-500 px-3 py-2 rounded-lg transition">
                    Keluar
                </button>
            </form>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-surface-50 border-t border-surface-200 py-6 text-center text-sm text-stone-500 mt-auto">
    &copy; 2026 ZakaFlow — Sistem Informasi Pengelolaan Zakat &amp; Donasi
</footer>

</body>
</html>
