<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="id">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | ZakaFlow'">ZakaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#f4f7f2',
                            100: '#e3ebe0',
                            200: '#c9d8c4',
                            300: '#a3b89c',
                            400: '#7d9a75',
                            500: '#5f8260',
                            600: '#4d6b4e',
                            700: '#3f5840',
                            800: '#334833',
                            900: '#2a3b29',
                            950: '#1a2619',
                        },
                        accent: {
                            50:  '#fdf8f3',
                            100: '#faeee3',
                            200: '#f4d9c4',
                            300: '#e8bc94',
                            400: '#d9966a',
                            500: '#c97d4f',
                            600: '#a8643d',
                            700: '#8a5032',
                            800: '#6f4129',
                            900: '#5a3522',
                        },
                        surface: {
                            50:  '#faf7f2',
                            100: '#f0ebe3',
                            200: '#e2d9cc',
                        },
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:fragment="navbar" class="bg-primary-900 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-3">
        <a th:href="@{/user}" class="flex items-center gap-3 mx-0 hover:text-accent-200 transition">
            <img th:src="@{/img/logo.svg}" src="/img/logo.svg" alt="ZakaFlow" class="h-8 w-auto"/>
            <span class="text-xl font-bold tracking-tight">ZakaFlow</span>
        </a>
        <div class="flex flex-wrap gap-1 text-sm font-medium items-center">
            <a th:href="@{/user}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition"
               th:classappend="${activePage == 'dashboard'} ? 'bg-primary-800 text-accent-200' : ''">Dashboard</a>
            <a th:href="@{/user/programs}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition"
               th:classappend="${activePage == 'programs'} ? 'bg-primary-800 text-accent-200' : ''">Program</a>
            <a th:href="@{/user/statistics}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition"
               th:classappend="${activePage == 'statistics'} ? 'bg-primary-800 text-accent-200' : ''">Statistik</a>
            <a th:href="@{/user/donations}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition"
               th:classappend="${activePage == 'donations'} ? 'bg-primary-800 text-accent-200' : ''">Riwayat Saya</a>
            <a th:href="@{/user/profile}"
               class="hover:text-accent-200 hover:bg-primary-800 px-3 py-2 rounded-lg transition"
               th:classappend="${activePage == 'profile'} ? 'bg-primary-800 text-accent-200' : ''">Profil</a>
            <span sec:authorize="isAuthenticated()"
                  class="hidden sm:inline text-white/60 text-xs px-2"
                  sec:authentication="name">user</span>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit"
                        class="hover:text-accent-200 bg-accent-600 hover:bg-accent-500 px-3 py-2 rounded-lg transition">
                    Keluar
                </button>
            </form>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-surface-50 border-t border-surface-200 py-6 text-center text-sm text-stone-500 mt-auto">
    &copy; 2026 ZakaFlow — Portal Donatur
</footer>

<div th:fragment="alerts">
    <div th:if="${successMessage}" class="mb-6 p-4 bg-green-50 text-green-800 rounded-xl border border-green-100 text-sm font-medium"
         th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 text-red-800 rounded-xl border border-red-100 text-sm font-medium"
         th:text="${errorMessage}"></div>
</div>

</body>
</html>
