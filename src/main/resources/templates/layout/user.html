<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="id">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | ZakaFlow'">ZakaFlow</title>
    <link rel="shortcut icon" th:href="@{/img/icon.jpeg(v=1)}" type="image/x-icon"/>
    <link rel="icon" th:href="@{/img/icon.jpeg(v=1)}" type="image/jpeg"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50:  '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                            950: '#022c22',
                        },
                        accent: {
                            50:  '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        },
                        surface: {
                            50:  '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                        },
                    },
                    boxShadow: {
                        card: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-surface-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

<nav th:fragment="navbar" class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-surface-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <a th:href="@{/user}" class="flex items-center gap-2 font-bold text-xl text-gray-900 tracking-tight hover:text-primary-600 transition">
                <span class="w-8 h-8 rounded-lg bg-primary-500 flex items-center justify-center text-white text-sm font-extrabold">Z</span>
                ZakaFlow <span class="text-xs font-semibold px-2 py-0.5 rounded bg-primary-50 text-primary-700 border border-primary-100 ml-1">Donatur</span>
            </a>
            <div class="hidden md:flex items-center gap-1 text-sm font-medium">
                <a th:href="@{/user}"
                   th:classappend="${activePage == 'dashboard'} ? 'text-primary-600 border-b-2 border-primary-500' : 'text-gray-600 hover:text-primary-600 border-b-2 border-transparent'"
                   class="px-4 py-5 transition font-semibold">Ringkasan</a>
                <a th:href="@{/user/programs}"
                   th:classappend="${activePage == 'programs'} ? 'text-primary-600 border-b-2 border-primary-500' : 'text-gray-600 hover:text-primary-600 border-b-2 border-transparent'"
                   class="px-4 py-5 transition font-semibold">Program Donasi</a>
                <a th:href="@{/user/donations}"
                   th:classappend="${activePage == 'donations'} ? 'text-primary-600 border-b-2 border-primary-500' : 'text-gray-600 hover:text-primary-600 border-b-2 border-transparent'"
                   class="px-4 py-5 transition font-semibold">Riwayat Donasi</a>
                <a th:href="@{/user/statistics}"
                   th:classappend="${activePage == 'statistics'} ? 'text-primary-600 border-b-2 border-primary-500' : 'text-gray-600 hover:text-primary-600 border-b-2 border-transparent'"
                   class="px-4 py-5 transition font-semibold">Statistik</a>
                <a th:href="@{/user/profile}"
                   th:classappend="${activePage == 'profile'} ? 'text-primary-600 border-b-2 border-primary-500' : 'text-gray-600 hover:text-primary-600 border-b-2 border-transparent'"
                   class="px-4 py-5 transition font-semibold">Profil</a>
            </div>
            <div class="flex items-center gap-2 text-sm font-medium">
                <span class="hidden lg:inline text-gray-400 text-xs px-2" sec:authentication="name">User</span>
                <a th:href="@{/}" class="text-gray-600 hover:text-primary-600 px-3 py-2 rounded-lg transition text-xs border border-surface-200">Lihat Web Publik</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-xl transition text-sm">
                        Keluar
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-surface-50 border-t border-surface-200 py-6 text-center text-sm text-gray-400 mt-auto">
    &copy; 2026 ZakaFlow — Portal Donatur
</footer>

<div th:fragment="alerts">
    <div th:if="${successMessage}" class="mb-6 p-4 bg-green-50 text-green-800 rounded-xl border border-green-100 text-sm font-medium"
         th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 text-red-800 rounded-xl border border-red-100 text-sm font-medium"
         th:text="${errorMessage}"></div>
</div>

</body>
</html>
