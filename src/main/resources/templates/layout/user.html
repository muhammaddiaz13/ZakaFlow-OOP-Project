<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="id">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | ZakaFlow'">ZakaFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50:  '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                            950: '#022c22',
                        },
                        accent: {
                            50:  '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        },
                        surface: {
                            50:  '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                        },
                    },
                    boxShadow: {
                        card: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-surface-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

<footer th:fragment="footer" class="bg-surface-50 border-t border-surface-200 py-6 text-center text-sm text-gray-400 mt-auto">
    &copy; 2026 ZakaFlow — Portal Donatur
</footer>

<div th:fragment="alerts">
    <div th:if="${successMessage}" class="mb-6 p-4 bg-green-50 text-green-800 rounded-xl border border-green-100 text-sm font-medium"
         th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 text-red-800 rounded-xl border border-red-100 text-sm font-medium"
         th:text="${errorMessage}"></div>
</div>

</body>
</html>
