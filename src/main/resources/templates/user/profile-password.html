<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/user :: head('Ubah Password')}"></head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/user :: navbar}" th:with="activePage='profile'"></nav>

<main class="flex-1 max-w-xl mx-auto w-full px-4 py-8">
    <a th:href="@{/user/profile}" class="text-sm text-primary-700 hover:text-primary-800 font-medium mb-6 inline-block">&larr; Kembali</a>

    <h1 class="text-2xl font-bold text-stone-900 mb-6">Ubah Password</h1>

    <div th:replace="~{layout/user :: alerts}"></div>

    <form th:action="@{/user/profile/password}" method="post"
          class="bg-white rounded-2xl shadow-sm border border-surface-200 p-8 space-y-5">
        <div>
            <label for="currentPassword" class="block text-sm font-medium text-stone-700 mb-1">Password Lama</label>
            <input type="password" id="currentPassword" name="currentPassword" required
                   class="w-full px-4 py-2.5 border border-surface-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"/>
        </div>
        <div>
            <label for="newPassword" class="block text-sm font-medium text-stone-700 mb-1">Password Baru</label>
            <input type="password" id="newPassword" name="newPassword" required minlength="6"
                   class="w-full px-4 py-2.5 border border-surface-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"/>
            <p class="text-xs text-stone-400 mt-1">Minimal 6 karakter.</p>
        </div>
        <div>
            <label for="confirmPassword" class="block text-sm font-medium text-stone-700 mb-1">Konfirmasi Password Baru</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
                   class="w-full px-4 py-2.5 border border-surface-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"/>
        </div>
        <button type="submit"
                class="w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-3 rounded-lg transition">
            Ubah Password
        </button>
    </form>
</main>

<footer th:replace="~{layout/user :: footer}"></footer>
</body>
</html>
