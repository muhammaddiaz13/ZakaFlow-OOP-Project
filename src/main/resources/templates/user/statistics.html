<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/user :: head('Statistik Donasi')}"></head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/user :: navbar}" th:with="activePage='statistics'"></nav>

<main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <h1 class="text-3xl font-bold text-stone-900 mb-2">Statistik Donasi</h1>
    <p class="text-stone-600 mb-8">Ringkasan aktivitas donasi Anda dalam 6 bulan terakhir.</p>

    <div class="grid sm:grid-cols-3 gap-5 mb-8">
        <div class="bg-white rounded-2xl border border-surface-200 p-5 shadow-sm">
            <p class="text-sm text-stone-500">Total Donasi</p>
            <p class="text-2xl font-bold text-primary-700 mt-1"
               th:text="'Rp ' + ${#numbers.formatDecimal(totalDonated, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
        </div>
        <div class="bg-white rounded-2xl border border-surface-200 p-5 shadow-sm">
            <p class="text-sm text-stone-500">Total Transaksi</p>
            <p class="text-2xl font-bold text-stone-900 mt-1" th:text="${donationCount}">0</p>
        </div>
        <div class="bg-white rounded-2xl border border-surface-200 p-5 shadow-sm">
            <p class="text-sm text-stone-500">Sukses / Pending</p>
            <p class="text-2xl font-bold text-accent-700 mt-1">
                <span th:text="${successCount}">0</span> / <span th:text="${pendingCount}">0</span>
            </p>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-surface-200 p-6 shadow-sm">
        <h2 class="text-lg font-semibold text-stone-900 mb-4">Donasi per Bulan</h2>
        <canvas id="donationChart" height="100"></canvas>
        <p th:if="${donationCount == 0}" class="text-center text-stone-500 text-sm mt-4">
            Belum ada data donasi untuk ditampilkan.
        </p>
    </div>
</main>

<footer th:replace="~{layout/user :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const labels = /*[[${chartLabels}]]*/ [];
    const amounts = /*[[${chartAmounts}]]*/ [];

    new Chart(document.getElementById('donationChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Donasi (Rp)',
                data: amounts,
                backgroundColor: 'rgba(77, 107, 78, 0.7)',
                borderColor: 'rgba(63, 88, 64, 1)',
                borderWidth: 1,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: (v) => 'Rp ' + v.toLocaleString('id-ID')
                    }
                }
            }
        }
    });
</script>
</body>
</html>
