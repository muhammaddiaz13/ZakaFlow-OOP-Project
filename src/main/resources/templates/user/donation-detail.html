<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/user :: head('Detail Donasi')}"></head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/user :: navbar}" th:with="activePage='donations'"></nav>

<main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
    <a th:href="@{/user/donations}" class="text-sm text-primary-700 hover:text-primary-800 font-medium mb-6 inline-block">&larr; Kembali ke riwayat</a>

    <div class="bg-white rounded-2xl shadow-sm border border-surface-200 overflow-hidden">
        <div class="bg-gradient-to-r from-primary-800 to-primary-900 px-8 py-6 text-white">
            <p class="text-sm text-white/70">Bukti Donasi</p>
            <h1 class="text-2xl font-bold mt-1">#<span th:text="${transaction.id}">001</span></h1>
            <p class="text-white/80 text-sm mt-1"
               th:text="${#temporals.format(transaction.transactionDate, 'dd MMMM yyyy, HH:mm')}">Tanggal</p>
        </div>

        <dl class="divide-y divide-surface-200 px-8">
            <div class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Donatur</dt>
                <dd class="text-sm font-semibold" th:text="${user.username}">-</dd>
            </div>
            <div class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Program</dt>
                <dd class="text-sm font-semibold text-right" th:text="${transaction.program.title}">-</dd>
            </div>
            <div class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Kategori</dt>
                <dd class="text-sm font-semibold" th:text="${transaction.program.category.name}">-</dd>
            </div>
            <div class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Metode Pembayaran</dt>
                <dd class="text-sm font-semibold">
                    <span th:text="${transaction.paymentChannel.label}">QRIS</span>
                    <span th:if="${transaction.paymentMethod != null}" class="block text-xs text-stone-500 font-normal"
                          th:text="${transaction.paymentMethod.name} + ' — ' + ${transaction.paymentMethod.accountNumber}">BCA</span>
                </dd>
            </div>
            <div th:if="${transaction.paymentReference}" class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Referensi</dt>
                <dd class="text-sm font-semibold font-mono" th:text="${transaction.paymentReference}">-</dd>
            </div>
            <div class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Nominal</dt>
                <dd class="text-lg font-bold text-primary-700"
                    th:text="'Rp ' + ${#numbers.formatDecimal(transaction.amount, 0, 'COMMA', 0, 'POINT')}">Rp 0</dd>
            </div>
            <div class="py-4 flex justify-between gap-4">
                <dt class="text-sm text-stone-500">Status</dt>
                <dd>
                    <span th:switch="${transaction.status.name()}"
                          th:class="${transaction.status.name() == 'SUCCESS'} ? 'bg-green-50 text-green-700' : (${transaction.status.name() == 'PENDING'} ? 'bg-amber-50 text-amber-700' : 'bg-red-50 text-red-700')"
                          class="px-3 py-1 rounded-full text-xs font-semibold"
                          th:text="${transaction.status}">SUCCESS</span>
                </dd>
            </div>
        </dl>

        <div class="px-8 pb-8 flex flex-wrap gap-3">
            <a th:if="${transaction.status.name() == 'PENDING'}" th:href="@{/user/payment/{id}(id=${transaction.id})}"
               class="flex-1 text-center bg-accent-500 hover:bg-accent-600 text-white font-semibold py-3 rounded-lg transition">
                Lanjutkan Pembayaran
            </a>
            <a th:href="@{/user/donations/{id}/print(id=${transaction.id})}" target="_blank"
               class="flex-1 text-center bg-primary-700 hover:bg-primary-800 text-white font-semibold py-3 rounded-lg transition">
                Cetak Bukti
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{layout/user :: footer}"></footer>
</body>
</html>
