<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/user :: head('Edit Profil')}"></head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/user :: navbar}" th:with="activePage='profile'"></nav>

<main class="flex-1 max-w-xl mx-auto w-full px-4 py-8">
    <a th:href="@{/user/profile}" class="text-sm text-primary-700 hover:text-primary-800 font-medium mb-6 inline-block">&larr; Kembali</a>

    <h1 class="text-2xl font-bold text-stone-900 mb-6">Edit Email</h1>

    <div th:replace="~{layout/user :: alerts}"></div>

    <form th:action="@{/user/profile/edit}" method="post"
          class="bg-white rounded-2xl shadow-sm border border-surface-200 p-8 space-y-5">
        <div>
            <label class="block text-sm font-medium text-stone-500 mb-1">Username</label>
            <p class="text-stone-900 font-semibold" th:text="${user.username}">donatur</p>
            <p class="text-xs text-stone-400 mt-1">Username tidak dapat diubah.</p>
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-stone-700 mb-1">Email</label>
            <input type="email" id="email" name="email" required th:value="${user.email}"
                   class="w-full px-4 py-2.5 border border-surface-200 rounded-lg focus:ring-2 focus:ring-primary-600 outline-none"/>
        </div>
        <button type="submit"
                class="w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-3 rounded-lg transition">
            Simpan Perubahan
        </button>
    </form>
</main>

<footer th:replace="~{layout/user :: footer}"></footer>
</body>
</html>
