<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lupa Password - ZakaFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

    <nav class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center shadow-xs">
        <a href="/" class="text-xl font-bold text-slate-900 flex items-center gap-2">
            <span class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white text-sm font-extrabold">Z</span>
            ZakaFlow
        </a>
        <a th:href="@{/login}" class="text-sm font-semibold text-slate-600 hover:text-slate-900">Kembali Masuk</a>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Lupa Password</h2>
                <p class="text-sm text-gray-500 mt-1">
                    Masukkan email terdaftar Anda untuk mendapatkan link simulasi reset password.
                </p>
            </div>

            <div th:if="${error}" class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl text-sm" th:text="${error}"></div>
            <div th:if="${success}" class="mb-4 p-3 bg-green-50 border-l-4 border-green-500 text-green-700 rounded-r-xl text-sm" th:text="${success}"></div>

            <form th:action="@{/forgot-password}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                    <input type="email" name="email" required autofocus
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-sm" 
                           placeholder="nama@email.com">
                </div>

                <button type="submit" 
                        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 rounded-xl transition shadow-sm cursor-pointer">
                    Kirim Link Reset
                </button>
            </form>
        </div>
    </main>

    <script th:inline="javascript" th:if="${simulatedLink}">
        var url = /*[[${simulatedLink}]]*/ '';
        if (url) {
            window.location.href = url;
        }
    </script>

</body>
</html>
