<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ubah Password Baru - ZakaFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

    <nav class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center shadow-xs">
        <span class="text-xl font-bold text-slate-900 flex items-center gap-2">
            <span class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white text-sm font-extrabold">Z</span>
            ZakaFlow
        </span>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Ubah Password</h2>
                <p class="text-sm text-gray-500 mt-1">Silakan ketikkan kombinasi password baru Anda.</p>
            </div>

            <div th:if="${error}" class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl text-sm" th:text="${error}"></div>

            <form th:action="@{/forgot-password/reset}" method="post" class="space-y-4">
                <input type="hidden" name="token" th:value="${token}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-sm"
                           placeholder="Minimal 6 karakter">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
                    <input type="password" name="confirmPassword" required minlength="6"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-sm"
                           placeholder="Ulangi password baru">
                </div>

                <button type="submit" 
                        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 rounded-xl transition shadow-sm cursor-pointer pt-2">
                    Perbarui Password
                </button>
            </form>
        </div>
    </main>

</body>
</html>
