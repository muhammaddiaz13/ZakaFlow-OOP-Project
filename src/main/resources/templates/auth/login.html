<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Masuk')}"></head>
<body class="bg-surface-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-card border border-surface-100 p-8">
        <div class="text-center mb-8">
            <div class="w-12 h-12 mx-auto rounded-xl bg-primary-500 flex items-center justify-center text-white text-lg font-extrabold mb-4">Z</div>
            <h1 class="text-2xl font-bold text-gray-900">Masuk ke ZakaFlow</h1>
            <p class="text-sm text-gray-500 mt-1">Gunakan akun Admin atau Donatur</p>
        </div>

        <div th:if="${successMessage}" class="mb-4 p-3 bg-green-50 text-green-700 text-sm rounded-xl border border-green-100"
             th:text="${successMessage}"></div>
        <div th:if="${success}" class="mb-4 p-3 bg-green-50 text-green-700 text-sm rounded-xl border border-green-100"
             th:text="${success}"></div>
        <div th:if="${param.error}" class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded-xl border border-red-100">
            Username atau password salah.
        </div>
        <div th:if="${param.logout}" class="mb-4 p-3 bg-green-50 text-green-700 text-sm rounded-xl border border-green-100">
            Anda telah keluar.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       class="w-full px-4 py-2.5 border border-surface-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                       placeholder="admin / donatur"/>
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <a th:href="@{/forgot-password}" class="text-xs font-bold text-primary-600 hover:text-primary-700 transition underline">
                        Lupa password?
                    </a>
                </div>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2.5 border border-surface-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                       placeholder="••••••••"/>
            </div>
            
            <button type="submit"
                    class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2.5 rounded-xl transition shadow-sm">
                Masuk
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <span class="border-b border-surface-200 w-1/5 lg:w-1/4"></span>
            <span class="text-xs text-center text-gray-400 uppercase tracking-wide">Atau</span>
            <span class="border-b border-surface-200 w-1/5 lg:w-1/4"></span>
        </div>

        <div class="mt-6">
            <a href="/oauth2/authorization/google" class="w-full flex items-center justify-center gap-3 bg-white border border-surface-200 text-gray-700 font-medium py-2.5 rounded-xl hover:bg-gray-50 transition shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5"/>
                Lanjutkan dengan Google
            </a>
        </div>
        <p class="mt-6 text-sm text-gray-500 text-center">
            Belum punya akun?
            <a th:href="@{/register}" class="font-semibold text-primary-600 hover:text-primary-700 transition">Daftar</a>
        </p>

        <p class="mt-4 text-xs text-gray-400 text-center">
            Demo: admin / admin123 &nbsp;|&nbsp; donatur / donatur123
        </p>
    </div>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
