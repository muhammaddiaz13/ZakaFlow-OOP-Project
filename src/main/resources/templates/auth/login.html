<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Masuk')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-slate-100 p-8">
        <h1 class="text-2xl font-bold text-slate-900 text-center mb-2">Masuk ke ZakaFlow</h1>
        <p class="text-sm text-slate-500 text-center mb-8">Gunakan akun Admin atau Donatur</p>

        <div th:if="${param.error}" class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-100">
            Username atau password salah.
        </div>
        <div th:if="${param.logout}" class="mb-4 p-3 bg-green-50 text-green-700 text-sm rounded-lg border border-green-100">
            Anda telah keluar.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-600 focus:border-primary-600 outline-none transition"
                       placeholder="admin / donatur"/>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-600 focus:border-primary-600 outline-none transition"
                       placeholder="••••••••"/>
            </div>
            <button type="submit"
                    class="w-full bg-primary-700 text-white font-semibold py-2.5 rounded-lg hover:bg-primary-800 transition">
                Masuk
            </button>
        </form>

        <p class="mt-6 text-xs text-slate-400 text-center">
            Demo: admin / admin123 &nbsp;|&nbsp; donatur / donatur123
        </p>
    </div>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
