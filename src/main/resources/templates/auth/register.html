<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/main :: head('Daftar')}"></head>
<body class="bg-surface-50 text-gray-600 min-h-screen flex flex-col font-sans antialiased">

<nav th:replace="~{layout/main :: navbar}"></nav>

<main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-card border border-surface-100 p-8">
        <div class="text-center mb-8">
            <div class="w-12 h-12 mx-auto rounded-xl bg-primary-500 flex items-center justify-center text-white text-lg font-extrabold mb-4">Z</div>
            <h1 class="text-2xl font-bold text-gray-900">Daftar di ZakaFlow</h1>
            <p class="text-sm text-gray-500 mt-1">Buat akun donatur baru</p>
        </div>

        <div th:if="${errorMessage}" class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded-xl border border-red-100"
             th:text="${errorMessage}">
            Terjadi kesalahan.
        </div>

        <form th:action="@{/register}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       th:value="${username}"
                       class="w-full px-4 py-2.5 border border-surface-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                       placeholder="nama.pengguna"/>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                       th:value="${email}"
                       class="w-full px-4 py-2.5 border border-surface-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                       placeholder="nama@email.com"/>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="w-full px-4 py-2.5 border border-surface-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                       placeholder="Minimal 6 karakter"/>
            </div>
            <button type="submit"
                    class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2.5 rounded-xl transition shadow-sm">
                Daftar
            </button>
        </form>

        <div th:replace="~{auth/_social :: dividerAndGoogle}"></div>

        <p class="mt-6 text-sm text-gray-500 text-center">
            Sudah punya akun?
            <a th:href="@{/login}" class="font-semibold text-primary-600 hover:text-primary-700 transition">Masuk</a>
        </p>
    </div>
</main>

<footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
